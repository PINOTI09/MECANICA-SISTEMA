<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mecânica Linha Pesada | Gestão Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f1113; color: #e5e7eb; min-height: 100vh; font-size: 14px; }
        
        header { 
            background: #1c1f23; padding: 12px; border-bottom: 3px solid #3b82f6; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1001;
        }
        .logo h1 { font-size: 0.9rem; color: #fff; text-transform: uppercase; }
        .logo span { color: #3b82f6; font-size: 0.65rem; font-weight: bold; }

        nav { 
            background: #1c1f23; display: flex; overflow-x: auto; white-space: nowrap;
            position: sticky; top: 58px; z-index: 1000; border-bottom: 1px solid #333;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .tab-link { 
            padding: 15px 18px; cursor: pointer; font-weight: bold; font-size: 0.7rem; 
            color: #9ca3af; text-transform: uppercase; border-bottom: 3px solid transparent; flex-shrink: 0;
        }
        .tab-link.active { color: #3b82f6; border-bottom: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #1c1f23; padding: 15px; border-radius: 12px; border: 1px solid #2d3136; margin-bottom: 10px; }
        .card-cliente { border-left: 4px solid #3b82f6; }
        .info-linha { display: flex; flex-direction: column; margin-bottom: 5px; border-bottom: 1px solid #2d3136; padding-bottom: 5px; }
        .info-label { font-size: 0.6rem; color: #3b82f6; text-transform: uppercase; font-weight: bold; }
        .info-valor { font-size: 0.85rem; color: #fff; }

        h2 { font-size: 0.85rem; margin-bottom: 12px; color: #3b82f6; border-left: 3px solid #3b82f6; padding-left: 8px; text-transform: uppercase; }
        
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
        .campo { display: flex; flex-direction: column; margin-bottom: 8px; }
        .campo label { font-size: 0.6rem; color: #9ca3af; margin-bottom: 3px; font-weight: 600; }
        
        input, select, textarea { padding: 10px; border: 1px solid #374151; border-radius: 6px; background: #111827; color: #fff; font-size: 0.9rem; width: 100%; outline: none; }

        .btn { padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; width: 100%; font-size: 0.75rem; margin-top: 5px; }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn-green { background: #10b981; color: #fff; }

        .tabela-itens { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
        .tabela-itens th { font-size: 0.55rem; color: #3b82f6; text-align: left; padding: 4px; text-transform: uppercase; }
        
        #tela-login { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; position: fixed; width: 100%; z-index: 10000; }
    </style>
</head>
<body onload="verificarLogin(); setarDatasIniciais();">

    <div id="tela-login">
        <div class="card" style="width: 85%; max-width: 300px; text-align: center;">
            <h2>LINHA PESADA</h2>
            <input type="password" id="pass" placeholder="Senha" style="text-align:center; margin-top:10px;">
            <button onclick="logar()" class="btn btn-blue" style="margin-top:15px">ENTRAR</button>
        </div>
    </div>

    <div id="sistema" style="display:none;">
        <header>
            <div class="logo">
                <h1>Mecânica Linha Pesada</h1>
                <span>CNPJ: 48.794.084/0001-09</span>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:#ef4444; font-weight:bold; font-size:0.7rem">SAIR</button>
        </header>

        <nav id="nav-abas">
            <div class="tab-link active" onclick="abrirAba(event, 'aba_cad_cliente')">1. Cadastro</div>
            <div class="tab-link" onclick="abrirAba(event, 'aba_clientes')">2. Clientes</div>
            <div class="tab-link" onclick="abrirAba(event, 'aba_nova_os')">3. Nova OC</div>
            <div class="tab-link" onclick="abrirAba(event, 'aba_hist_os')">4. Histórico</div>
            <div class="tab-link" onclick="abrirAba(event, 'aba_financeiro')">5. Financeiro</div>
            <div class="tab-link" onclick="abrirAba(event, 'aba_devedores')">6. Devedores</div>
        </nav>

        <main class="container">
            <section id="aba_cad_cliente" class="tab-content active">
                <div class="card">
                    <h2>Informações do Cliente</h2>
                    <div class="grid-form">
                        <div class="campo"><label>Nome / Razão Social</label><input type="text" id="cl_nome"></div>
                        <div class="campo"><label>CPF / CNPJ</label><input type="text" id="cl_doc" maxlength="18" oninput="mascaraDoc(this)"></div>
                        <div class="campo"><label>WhatsApp</label><input type="text" id="cl_tel" maxlength="15" oninput="mascaraTel(this)"></div>
                        <div class="campo"><label>Endereço / Nº</label><input type="text" id="cl_end"></div>
                        <div class="campo"><label>Bairro</label><input type="text" id="cl_bairro"></div>
                        <div class="campo"><label>Cidade / UF</label><input type="text" id="cl_cidade"></div>
                    </div>
                    <button class="btn btn-blue" onclick="salvarCliente()">SALVAR CADASTRO</button>
                </div>
            </section>

            <section id="aba_clientes" class="tab-content">
                <h2>Clientes Cadastrados</h2>
                <div id="listaClientes"></div>
            </section>

            <section id="aba_nova_os" class="tab-content">
                <div class="card">
                    <h2>Gerar Nova Ordem de Serviço</h2>
                    <div class="grid-form">
                        <div class="campo"><label>Selecionar Cliente</label><select id="os_cliente"></select></div>
                        <div class="campo"><label>Placa</label><input type="text" id="os_placa"></div>
                        <div class="campo"><label>KM</label><input type="number" id="os_km"></div>
                        <div class="campo"><label>Mecânico</label><select id="os_mecanico"><option>Abel Moreira</option><option>Igor</option></select></div>
                        <div class="campo"><label>Data Emissão</label><input type="date" id="os_data"></div>
                        <div class="campo"><label>Vencimento</label><input type="date" id="os_vencimento"></div>
                    </div>

                    <table class="tabela-itens">
                        <thead>
                            <tr>
                                <th style="width: 25%;">TIPO</th>
                                <th style="width: 30%;">DESCRIÇÃO</th>
                                <th style="width: 10%;">QTD</th>
                                <th style="width: 15%;">R$ UNIT</th>
                                <th style="width: 20%;">R$ TOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-itens"></tbody>
                    </table>
                    
                    <button class="btn" style="border:1px solid #3b82f6; color:#3b82f6; background:none; margin-bottom:10px" onclick="adicionarLinha()">+ ADICIONAR ITEM</button>
                    
                    <div class="campo"><label>Observações</label><textarea id="os_obs" rows="2"></textarea></div>

                    <div class="grid-form">
                        <div class="campo"><label>Entrada R$</label><input type="number" id="os_entrada" value="0" oninput="calcTotal()"></div>
                        <div class="campo"><label>Desconto R$</label><input type="number" id="os_desconto" value="0" oninput="calcTotal()"></div>
                        <div class="campo"><label>TOTAL DA OC</label><input type="text" id="os_total" readonly style="color:#10b981; font-weight:bold; font-size:1.1rem"></div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                        <button class="btn btn-green" onclick="salvarOS()">SALVAR NO SISTEMA</button>
                        <button class="btn btn-blue" onclick="gerarPDF()">VISUALIZAR PDF</button>
                    </div>
                </div>
            </section>

            <section id="aba_hist_os" class="tab-content"><div id="historicoOS"></div></section>
            <section id="aba_financeiro" class="tab-content"><div class="card" style="text-align:center"><label>TOTAL RECEBIDO</label><h1 id="total_financeiro" style="color:#10b981; font-size: 2.2rem;">R$ 0,00</h1></div></section>
            <section id="aba_devedores" class="tab-content"><div id="listaDevedores"></div></section>
        </main>
    </div>

    <script>
        function mascaraDoc(i) {
            let v = i.value.replace(/\D/g, '');
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/, '$1.$2');
                v = v.replace(/(\d{3})(\d)/, '$1.$2');
                v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            } else {
                v = v.replace(/^(\d{2})(\d)/, '$1.$2');
                v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
                v = v.replace(/(\d{4})(\d)/, '$1-$2');
            }
            i.value = v;
        }

        function mascaraTel(i) {
            let v = i.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
            if (v.length > 13) v = v.replace(/(\d{5})(\d)/, '$1-$2');
            else v = v.replace(/(\d{4})(\d)/, '$1-$2');
            i.value = v;
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCxkOwAQGtUP7D6HdzuJiSG3I2L9o84Chg", 
            authDomain: "mecanica-linha-pesada.firebaseapp.com", 
            projectId: "mecanica-linha-pesada", 
            storageBucket: "mecanica-linha-pesada.firebasestorage.app", 
            messagingSenderId: "1067537543837", 
            appId: "1:1067537543837:web:b3247ef2b1907f395f1a74" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.logar = () => { if(document.getElementById('pass').value === "8489") { localStorage.setItem('lp_login', 'ok'); location.reload(); } else alert("Senha Errada!"); };
        window.logout = () => { localStorage.removeItem('lp_login'); location.reload(); };
        window.verificarLogin = () => { if(localStorage.getItem('lp_login')) { document.getElementById('tela-login').style.display='none'; document.getElementById('sistema').style.display='block'; } };
        
        window.abrirAba = (e, id) => { 
            document.querySelectorAll('.tab-content, .tab-link').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            e.currentTarget.classList.add('active'); 
            window.scrollTo(0,0); 
        };
        
        window.setarDatasIniciais = () => { 
            const hoje = new Date();
            const venc = new Date();
            venc.setDate(hoje.getDate() + 15);
            document.getElementById('os_data').value = hoje.toISOString().split('T')[0];
            document.getElementById('os_vencimento').value = venc.toISOString().split('T')[0];
            adicionarLinha(); 
        };

        window.adicionarLinha = () => {
            const tr = document.createElement('tr'); tr.className = 'linha-item';
            tr.innerHTML = `
                <td><select class="os-tipo"><option>Peça Abel</option><option>Peça Mecânica</option><option>Mão-de-Obra</option></select></td>
                <td><input type="text" class="os-desc"></td>
                <td><input type="number" class="os-qtd" value="1" oninput="calcTotal()"></td>
                <td><input type="number" class="os-unit" value="0" oninput="calcTotal()"></td>
                <td><input type="text" class="os-subtotal" value="0.00" readonly style="background:transparent; border:none; color:#10b981; font-weight:bold; width:100%"></td>
            `;
            document.getElementById('corpo-itens').appendChild(tr);
        };

        window.calcTotal = () => {
            let t = 0; 
            document.querySelectorAll('.linha-item').forEach(l => {
                const q = parseFloat(l.querySelector('.os-qtd').value || 0);
                const u = parseFloat(l.querySelector('.os-unit').value || 0);
                const sub = q * u;
                l.querySelector('.os-subtotal').value = sub.toFixed(2);
                t += sub; 
            });
            const d = parseFloat(document.getElementById('os_desconto').value || 0);
            const ent = parseFloat(document.getElementById('os_entrada').value || 0); // Puxa entrada
            document.getElementById('os_total').value = (t - d - ent).toFixed(2); // Subtrai entrada e desconto
        };

        window.salvarCliente = async () => {
            const nome = document.getElementById('cl_nome').value;
            if(!nome) return alert("Digite o nome!");
            await addDoc(collection(db, "clientes"), {
                nome, doc: document.getElementById('cl_doc').value, tel: document.getElementById('cl_tel').value,
                end: document.getElementById('cl_end').value, bairro: document.getElementById('cl_bairro').value, cidade: document.getElementById('cl_cidade').value
            });
            alert("Cliente Salvo!");
            document.querySelectorAll('#aba_cad_cliente input').forEach(i => i.value="");
        };

        window.salvarOS = async () => {
            const itens = [];
            document.querySelectorAll('.linha-item').forEach(l => {
                itens.push({ tipo: l.querySelector('.os-tipo').value, desc: l.querySelector('.os-desc').value, qtd: l.querySelector('.os-qtd').value, unit: l.querySelector('.os-unit').value });
            });
            const dados = {
                cliente: document.getElementById('os_cliente').value, placa: document.getElementById('os_placa').value,
                km: document.getElementById('os_km').value, mecanico: document.getElementById('os_mecanico').value,
                data: document.getElementById('os_data').value, vencimento: document.getElementById('os_vencimento').value,
                entrada: parseFloat(document.getElementById('os_entrada').value || 0), // Salva entrada
                desconto: parseFloat(document.getElementById('os_desconto').value || 0),
                itens, total: parseFloat(document.getElementById('os_total').value), status: 'pendente'
            };
            await addDoc(collection(db, "ordens"), dados);
            alert("OC Salva com Sucesso!");
        };

        window.gerarPDF = async () => {
            const { jsPDF } = window.jspdf;
            const docPDF = new jsPDF();
            const nomeCl = document.getElementById('os_cliente').value;
            const q = query(collection(db, "clientes"), where("nome", "==", nomeCl));
            const snapCl = await getDocs(q);
            let dCl = { doc: '', tel: '', end: '', bairro: '', cidade: '' };
            snapCl.forEach(d => dCl = d.data());

            docPDF.setFontSize(16); docPDF.setTextColor(59, 130, 246);
            docPDF.text("MECÂNICA LINHA PESADA", 105, 15, { align: "center" });
            docPDF.setFontSize(9); docPDF.setTextColor(100);
            docPDF.text("CNPJ: 48.794.084/0001-09", 105, 21, { align: "center" });
            docPDF.line(15, 25, 195, 25);

            docPDF.setFontSize(10); docPDF.setTextColor(0);
            docPDF.text("DADOS DO CLIENTE", 15, 33);
            docPDF.setFontSize(9);
            docPDF.text(`Nome: ${nomeCl}`, 15, 39);
            docPDF.text(`CPF/CNPJ: ${dCl.doc || '-'}`, 15, 44);
            docPDF.text(`Endereço: ${dCl.end || '-'}, ${dCl.bairro || '-'}`, 15, 49);
            docPDF.text(`Fone: ${dCl.tel || '-'}`, 15, 54);

            docPDF.setFontSize(10);
            docPDF.text("DADOS DO VEÍCULO", 120, 33);
            docPDF.setFontSize(9);
            docPDF.text(`Placa: ${document.getElementById('os_placa').value.toUpperCase()}`, 120, 39);
            docPDF.text(`KM: ${document.getElementById('os_km').value}`, 120, 44);
            docPDF.text(`Mecânico: ${document.getElementById('os_mecanico').value}`, 120, 49);
            docPDF.text(`Emissão: ${document.getElementById('os_data').value.split('-').reverse().join('/')}`, 120, 54);
            docPDF.text(`Vencimento: ${document.getElementById('os_vencimento').value.split('-').reverse().join('/')}`, 120, 59);

            const corpo = [];
            document.querySelectorAll('.linha-item').forEach(l => {
                const sub = (l.querySelector('.os-qtd').value * l.querySelector('.os-unit').value).toFixed(2);
                corpo.push([l.querySelector('.os-tipo').value, l.querySelector('.os-desc').value, l.querySelector('.os-qtd').value, `R$ ${l.querySelector('.os-unit').value}`, `R$ ${sub}`]);
            });

            docPDF.autoTable({
                startY: 65,
                head: [['TIPO', 'DESCRIÇÃO', 'QTD', 'UNIT', 'SUBTOTAL']],
                body: corpo,
                theme: 'grid',
                headStyles: { fillColor: [59, 130, 246] }
            });

            let finalY = docPDF.lastAutoTable.finalY + 10;
            
            // Adicionando entrada no PDF se houver
            const entradaVal = parseFloat(document.getElementById('os_entrada').value || 0);
            if(entradaVal > 0) {
                docPDF.setFontSize(10);
                docPDF.text(`Valor de Entrada: R$ ${entradaVal.toFixed(2)}`, 145, finalY);
                finalY += 7;
            }

            docPDF.setFontSize(12);
            docPDF.text(`TOTAL FINAL: R$ ${document.getElementById('os_total').value}`, 145, finalY);
            docPDF.line(15, finalY + 30, 90, finalY + 30);
            docPDF.text("Assinatura do Responsável", 15, finalY + 35);
            docPDF.save(`OS_LINHAPESADA_${nomeCl}.pdf`);
        };

        onSnapshot(query(collection(db, "clientes"), orderBy("nome")), (snap) => {
            const list = document.getElementById('listaClientes');
            const select = document.getElementById('os_cliente');
            list.innerHTML = ""; select.innerHTML = "";
            snap.docs.forEach(d => {
                const c = d.data();
                list.innerHTML += `
                    <div class="card card-cliente">
                        <div class="info-linha"><span class="info-label">Nome / Razão Social</span><span class="info-valor">${c.nome}</span></div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div class="info-linha"><span class="info-label">CPF / CNPJ</span><span class="info-valor">${c.doc || '-'}</span></div>
                            <div class="info-linha"><span class="info-label">WhatsApp</span><span class="info-valor">${c.tel || '-'}</span></div>
                        </div>
                        <div class="info-linha"><span class="info-label">Endereço</span><span class="info-valor">${c.end || '-'}, ${c.bairro || '-'}</span></div>
                        <div class="info-linha"><span class="info-label">Cidade / UF</span><span class="info-valor">${c.cidade || '-'}</span></div>
                    </div>`;
                select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
            });
        });

        onSnapshot(collection(db, "ordens"), (snap) => {
            const hist = document.getElementById('historicoOS');
            const dev = document.getElementById('listaDevedores');
            let tRec = 0; hist.innerHTML = ""; dev.innerHTML = "";
            snap.docs.forEach(d => {
                const o = d.data();
                hist.innerHTML += `<div class="card"><b>${o.cliente}</b> - ${o.placa}<br>R$ ${o.total.toFixed(2)}</div>`;
                if(o.status === 'pendente') {
                    dev.innerHTML += `<div class="card" style="border-left:5px solid #ef4444"><b>${o.cliente}</b> - R$ ${o.total.toFixed(2)}<br><button class="btn btn-green" onclick="baixar('${d.id}')">BAIXAR</button></div>`;
                } else tRec += o.total;
            });
            document.getElementById('total_financeiro').innerText = `R$ ${tRec.toFixed(2)}`;
        });
        
        window.baixar = async (id) => { if(confirm("Confirmar pgto?")) await updateDoc(doc(db, "ordens", id), { status: 'pago' }); };
    </script>
</body>
</html>
